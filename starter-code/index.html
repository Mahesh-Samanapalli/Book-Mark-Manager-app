<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Bookmark manager app</title>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="logo-section">
          <img src="./assets/images/logo-light-theme.svg" alt="bookmark logo" />
        </div>
        <div class="sidebar-nav">
          <div class="navitem home">
            <img src="./assets/images/icon-home.svg" alt="" />
            <span>Home</span>
          </div>
          <div class="navitem archive">
            <img src="./assets/images/icon-archive.svg" alt="" />
            <span>Archived</span>
          </div>
        </div>
        <div class="sidebar-tags">
          <label class="tags-label" for="">TAGS</label>
          <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>AI</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Community</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Compatibility</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>CSS</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Design</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>FrameWork</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Git</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>HTML</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>javascript</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Layout</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Learning</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Perfomance</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Practice</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Reference</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Tips</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Tools</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
           <div class="tag-item">
            <div class="tag-item-cnt">
              <input type="checkbox" />
              <span>Tutorial</span>
            </div>
            <div class="tag-item-count">
              <span>1</span>
            </div>
          </div>
         
        </div>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div class="search-bar">
            <img src="./assets/images/icon-search.svg" alt="">
            <input type="text" placeholder="Search by title...">
          </div>
          <div class="user-profile">
            <div class="add-bookmark">
              <button class="add-bookmark-btn">+ Add Bookmark</button>
            </div>
            <div class="profile-cnt">
              <img src="./assets/images/image-avatar.webp" alt="">
            </div>
          </div>
        </header>
        <section class="bookmark-section"></section>
      </main>
    </div>
  </body>
</html>
